<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 160" width="520" height="160">
  <defs>
    <!-- Clip for orange (left half of text) -->
    <clipPath id="clip-orange">
      <rect x="0" y="0" width="285" height="160"/>
    </clipPath>
    <!-- Clip for purple (right half of text) -->
    <clipPath id="clip-purple">
      <rect x="285" y="0" width="235" height="160"/>
    </clipPath>
    <!-- Font from Google -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@900&amp;display=swap');
      .wordmark { font-family: 'Nunito', 'Varela Round', Arial Rounded MT Bold, sans-serif; font-weight: 900; font-size: 108px; letter-spacing: -2px; }
    </style>
  </defs>

  <!-- Orange layer (left) -->
  <g clip-path="url(#clip-orange)">
    <text class="wordmark" x="10" y="118" fill="#FFA500">Jeebly</text>
  </g>

  <!-- Purple layer (right) -->
  <g clip-path="url(#clip-purple)">
    <text class="wordmark" x="10" y="118" fill="#5E3DBC">Jeebly</text>
  </g>

  <!-- Orange dots (under orange section) -->
  <circle cx="52"  cy="144" r="6" fill="#FFA500"/>
  <circle cx="80"  cy="144" r="6" fill="#FFA500"/>
  <circle cx="108" cy="144" r="6" fill="#FFA500"/>
  <circle cx="136" cy="144" r="6" fill="#FFA500"/>
  <circle cx="164" cy="144" r="6" fill="#FFA500"/>
  <circle cx="192" cy="144" r="6" fill="#FFA500"/>
  <circle cx="220" cy="144" r="6" fill="#FFA500"/>
  <circle cx="248" cy="144" r="6" fill="#FFA500"/>
  <circle cx="276" cy="144" r="6" fill="#FFA500"/>

  <!-- Purple dots (under purple section) -->
  <circle cx="304" cy="144" r="6" fill="#5E3DBC"/>
  <circle cx="332" cy="144" r="6" fill="#5E3DBC"/>
  <circle cx="360" cy="144" r="6" fill="#5E3DBC"/>
  <circle cx="388" cy="144" r="6" fill="#5E3DBC"/>
  <circle cx="416" cy="144" r="6" fill="#5E3DBC"/>
  <circle cx="444" cy="144" r="6" fill="#5E3DBC"/>
  <circle cx="472" cy="144" r="6" fill="#5E3DBC"/>
  <circle cx="500" cy="144" r="6" fill="#5E3DBC"/>
</svg>
